<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="NutriScan AI - Precision nutrition scanning powered by AI. Scan menus, track meals, and optimize your nutrition." />

  <!-- Favicon and App Icons with cache-buster -->
  <link rel="icon" type="image/png" href="/schedule.png?v=2" />
  <link rel="shortcut icon" type="image/png" href="/schedule.png?v=2" />
  <link rel="apple-touch-icon" href="/schedule.png?v=2" />
  <!-- Preconnect to font origins ASAP -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!--
    FIX: The old code used rel="preload" for Material Symbols but never
    converted it to rel="stylesheet", so the font was fetched but never applied.
    That caused icons to render as raw text until JS ran.

    Pattern: preload (high-priority fetch) + onload trick to apply as stylesheet
    without blocking render. The noscript fallback handles JS-off browsers.
  -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
  </noscript>

  <!-- Body fonts — swap is fine here, no flash risk -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" />
  </noscript>

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  </noscript>

  <title>NutriScan AI</title>

  <!--
    Keep icons invisible until the font is confirmed loaded.
    main.jsx's document.fonts.ready callback will remove this rule.
    Using opacity instead of visibility so layout is stable (no reflow).
  -->
  <style>
    .material-symbols-outlined {
      opacity: 0;
      transition: opacity 0.15s ease;
      /* Prevent text fallback from blowing out layouts before font loads.
         Use font-size-based sizing so custom sizes (text-2xl, text-6xl etc) work. */
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
      font-size: 24px;
      width: 1em;
      height: 1em;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
